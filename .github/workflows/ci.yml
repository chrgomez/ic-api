name: CI Pipeline - Spring Boot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar tests automatizados
        run: ./mvnw test

      - name: Generar archivo JAR
        run: ./mvnw package -DskipTests

      - name: Guardar artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: project-ci-jar
          path: target/*.jar

      - name: Notificación Slack OK
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: "CI EXITOSO"
          SLACK_MESSAGE: "Tests y empaquetado completados correctamente"
          SLACK_FOOTER: "GitHub Actions"

      - name: Notificación Slack ERROR
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "CI FALLÓ"
          SLACK_MESSAGE: "El pipeline falló"
          SLACK_FOOTER: "GitHub Actions"
