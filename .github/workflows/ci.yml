name: CI/CD Pipeline - Spring Boot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:

  #JOB 1: INTEGRACIÓN CONTINUA (Test + SonarQube)
  ci:
    name: Integración Continua y SonarQube
    runs-on: ubuntu-latest

    # Necesitamos exportar las variables de este job para que el job de notificaciones las lea
    outputs:
      sonar_status: ${{ steps.sonarqube_quality_gate.outputs.quality-gate-status }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      # Corre los tests y envía a SonarCloud
      - name: Test y Análisis de SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw clean verify sonar:sonar
          -Dsonar.projectKey=chrgomez_ic-api
          -Dsonar.organization=chrgomez
          -Dsonar.host.url=https://sonarcloud.io

      # ESTE ES EL PASO NUEVO: Espera la respuesta de SonarCloud
      - name: SonarQube Quality Gate check
        id: sonarqube_quality_gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # JOB 2: ENTREGA CONTINUA (Build)
  cd_delivery:
    name: Entrega Continua (Build JAR)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generar archivo JAR
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - name: Guardar artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: project-ci-jar
          path: target/*.jar

  # JOB 3: DESPLIEGUE CONTINUO (Docker)
  cd_deployment:
    name: Despliegue Continuo (Docker)
    runs-on: ubuntu-latest
    needs: cd_delivery
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # Descargamos el JAR que generó el job anterior
      - name: Descargar artefacto JAR
        uses: actions/download-artifact@v4
        with:
          name: project-ci-jar
          path: target/

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-ci:latest

  # JOB 4: NOTIFICACIONES
  notification:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs:
      - ci
      - cd_delivery
      - cd_deployment
    if: always()
    steps:
      - name: Notificación Slack OK
        if: needs.ci.result == 'success' && needs.cd_delivery.result == 'success' && needs.cd_deployment.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: "PIPELINE EXITOSO ✅"
          # Aquí agregamos la línea de SonarQube
          SLACK_MESSAGE: |
            Se testeó, compiló y publicó la imagen Docker correctamente 🚀
            *Calidad de Código (SonarQube):* ${{ needs.ci.outputs.sonar_status }}
          SLACK_FOOTER: "GitHub Actions"

      - name: Notificación Slack ERROR
        if: needs.ci.result == 'failure' || needs.cd_delivery.result == 'failure' || needs.cd_deployment.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "PIPELINE FALLÓ ❌"
          # Aquí también agregamos la info, por si falló por culpa de Sonar
          SLACK_MESSAGE: |
            Hubo errores en el pipeline CI/CD o no se cumplieron los estándares.
            *Calidad de Código (SonarQube):* ${{ needs.ci.outputs.sonar_status || 'No completado' }}
          SLACK_FOOTER: "GitHub Actions"
