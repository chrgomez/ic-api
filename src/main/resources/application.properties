# Puerto donde correr\u00e1 la API
server.port=8080

# Conexi\u00f3n a MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/utn_ci_db
spring.datasource.username=root
spring.datasource.password=toor
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# MAGIA DE HIBERNATE: 'update' crea las tablas si no existen
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true