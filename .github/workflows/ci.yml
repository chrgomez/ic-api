name: CI/CD Pipeline - Spring Boot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:

  # JOB 1: INTEGRACIÓN CONTINUA (Test + SonarQube)
  ci:
    name: Integración Continua y SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # CRÍTICO: Sonar necesita todo el historial de git para funcionar bien

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      # Corre los tests y envía el reporte a SonarCloud
      - name: Test y Análisis de SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Este secreto ya viene incluido en GitHub, no debes crearlo
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # El que creaste en el paso 1
        run: >
          ./mvnw clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=chrgomez_project-ci 
          -Dsonar.organization=chrgomez
          -Dsonar.host.url=https://sonarcloud.io

  # JOB 2: ENTREGA CONTINUA (Build)
  cd_delivery:
    name: Entrega Continua (Build JAR)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generar archivo JAR        
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - name: Guardar artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: project-ci-jar
          path: target/*.jar

  # JOB 3: DESPLIEGUE CONTINUO (Docker)
  cd_deployment:
    name: Despliegue Continuo (Docker)
    runs-on: ubuntu-latest
    needs: cd_delivery
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # Descargamos el JAR que generó el job anterior
      - name: Descargar artefacto JAR
        uses: actions/download-artifact@v4
        with:
          name: project-ci-jar
          path: target/

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-ci:latest

  # JOB 4: NOTIFICACIONES
  notification:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs:
      - ci
      - cd_delivery
      - cd_deployment
    if: always()
    steps:
      - name: Notificación Slack OK
        if: needs.ci.result == 'success' && needs.cd_delivery.result == 'success' && needs.cd_deployment.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: "PIPELINE EXITOSO"
          SLACK_MESSAGE: "Se testeó, compiló y publicó la imagen Docker correctamente 🚀"
          SLACK_FOOTER: "GitHub Actions"

      - name: Notificación Slack ERROR
        if: needs.ci.result == 'failure' || needs.cd_delivery.result == 'failure' || needs.cd_deployment.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "PIPELINE FALLÓ"
          SLACK_MESSAGE: "Hubo errores en el pipeline CI/CD ❌"
          SLACK_FOOTER: "GitHub Actions"
